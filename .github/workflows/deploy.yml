name: CI/CD Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Source Code
        uses: actions/checkout@v3

      - name: SSH into VPS and Run Deploy Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Navigate to the project folder on the VPS
            cd ~/coding/ai-chat-app || cd ~/ai-chat-app || exit 1
            
            # Fetch latest changes
            git pull origin main
            
            # Rebuild and restart the multi-container environment
            docker compose down
            docker compose up --build -d
            
            # Prune unused docker assets to save disk space
            docker image prune -f
